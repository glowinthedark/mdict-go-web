name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for the release (e.g., v1.0.0)"
        required: true
      release_name:
        description: "mdict-server"
        required: false
        default: "mdict-go-web"

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [linux-amd64, windows-amd64, darwin-amd64, darwin-arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26"

      - name: Build
        run: |
          # Extract OS and ARCH from target
          OS=$(echo ${{ matrix.target }} | cut -d '-' -f 1)
          ARCH=$(echo ${{ matrix.target }} | cut -d '-' -f 2)

          # Set extension for Windows
          EXT=""
          if [ "$OS" = "windows" ]; then
            EXT=".exe"
          fi

          # Build the binary
          cd mdict-go
          GOOS=$OS GOARCH=$ARCH go build -o ../mdict-server-${{ matrix.target }}$EXT .
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdict-server-${{ matrix.target }}
          path: mdict-server-${{ matrix.target }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: |
          find artifacts -type f -name "mdict-server-*" | sort

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.release_name }} ${{ github.event.inputs.tag }}
          draft: false
          prerelease: false
          files: |
            artifacts/*/*
