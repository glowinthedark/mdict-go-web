name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for the release (e.g., v0.1)"
        required: false
      release_name:
        description: "mdict-server"
        required: false
        default: "mdict-go-web"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('-v{0}', matrix.goarm) || '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────
          - { goos: linux,   goarch: amd64  }
          - { goos: linux,   goarch: arm64  }
          - { goos: linux,   goarch: arm,    goarm: "7" }
          - { goos: linux,   goarch: arm,    goarm: "6" }
          - { goos: linux,   goarch: 386    }
          # - { goos: linux,   goarch: riscv64 }
          # - { goos: linux,   goarch: mips64le }
          # - { goos: linux,   goarch: ppc64le }
          # - { goos: linux,   goarch: s390x  }
          # ── Windows ────────────────────────────────────────────
          - { goos: windows, goarch: amd64,  ext: ".exe" }
          - { goos: windows, goarch: arm64,  ext: ".exe" }
          - { goos: windows, goarch: 386,    ext: ".exe" }
          # ── macOS ──────────────────────────────────────────────
          - { goos: darwin,  goarch: amd64  }
          - { goos: darwin,  goarch: arm64  }
          # ── FreeBSD ────────────────────────────────────────────
          - { goos: freebsd, goarch: amd64  }
          - { goos: freebsd, goarch: arm64  }
          - { goos: freebsd, goarch: 386    }
          # ── OpenBSD ────────────────────────────────────────────
          # - { goos: openbsd, goarch: amd64  }
          # - { goos: openbsd, goarch: arm64  }
          # ── NetBSD ─────────────────────────────────────────────
          # - { goos: netbsd,  goarch: amd64  }
          # - { goos: netbsd,  goarch: arm64  }
          # ── Plan 9 (optional, uncomment if needed) ─────────────
          # - { goos: plan9,   goarch: amd64  }
          # - { goos: plan9,   goarch: arm    }

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          SUFFIX="${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('-v{0}', matrix.goarm) || '' }}"
          BINARY="mdict-server-${SUFFIX}${{ matrix.ext }}"
          cd mdict-go
          go build -trimpath -ldflags="-s -w" -o "../${BINARY}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mdict-server-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('-v{0}', matrix.goarm) || '' }}
          path: mdict-server-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('-v{0}', matrix.goarm) || '' }}${{ matrix.ext }}

  release:
    needs: build
    if: ${{ inputs.tag != '' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ inputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create git tag if missing
        run: |
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists — skipping."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
            echo "Tag ${TAG} pushed."
          fi

      - name: Create or update GitHub release
        run: |
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Release ${TAG} exists — replacing assets."
            gh release upload "${TAG}" artifacts/* --clobber
          else
            echo "Creating release ${TAG}."
            gh release create "${TAG}" artifacts/* \
              --title "${{ inputs.release_name }} ${TAG}" \
              --generate-notes
          fi
