<!--    <script src="https://cdnjs.cloudflare.com/ajax/libs/mark.js/8.11.1/mark.min.js" integrity="sha512-5CYOlHXGh6QpOFA/TeTylKLWfB3ftPsde7AnmhuitiTX4K5SqCLBeKro6sPS8ilsz1Q4NRx3v8Ko2IBiszzdww==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>-->
    <script src="mark.min.js"
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script type="text/javascript">
		function isMixedCase(s) {
			const lower = s.toLowerCase();
			const upper = s.toUpperCase();
			return s !== lower && s !== upper;
		}

		function normalizeCase(s) {
			return isMixedCase(s) && s.toLowerCase() || s;
		}
        document.addEventListener("readystatechange", event => {
            if (event.target.readyState === "complete") {
                const form = window.document.forms.frm;

                var params = new URLSearchParams(document.location.search);

                const path = params.get("path");
                form.path.value = path;
                var term = params.get('q');

                if (term) {
                    form.q.value = term;
                    colorize(term);
                }

                var content = document.querySelector('.content');

                content.addEventListener('dblclick', function (e) {
                    var selectedWord = document.getSelection().toString().trim();

                    if (selectedWord) {
						form.q.value = normalizeCase(selectedWord);
						form.submit();
                    }
                });

            }
        });

        function colorize(term) {
            var instance = new Mark(document.getElementById("main"));
            var rx = new RegExp(term, "gi");
            instance.markRegExp(rx, {
                "element": "span",
                "className": "hl"
            });
        }
    </script>

    <div id="main" class="container">
        <form name="frm" action="#">
            <input type="text" name="q" id="q" value="" autofocus>

            <label for="dict">&#x1F4D6;</label>
            <select name="path" id="path">

<p class=p_sticky>$$${{{DICT_NAME}}}</p>
