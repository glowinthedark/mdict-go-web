<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>$$${{{DICT_NAME}}}</title>

    <!-- set theme before first paint: no flash of the wrong theme -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('mdict.theme') ||
                    (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.dataset.theme = t;
            } catch (e) { }
        })();
    </script>

    <style>
        /* ── design tokens (φ = 1.618 drives the type scale & spacing rhythm) ── */
        :root {
            --t-sm: .786rem;
            --t-base: 1rem;
            --t-md: 1.272rem;
            --t-lg: 1.618rem;

            --sp-xs: .382rem;
            --sp-sm: .618rem;
            --sp: 1rem;
            --sp-md: 1.618rem;
            --sp-lg: 2.618rem;

            --measure: 66ch;
            --radius: .5rem;

            --bg: #f6f5f2;
            --surface: #fffefb;
            --paper: #fdfcf9;
            --fg: #23211d;
            --muted: #8b857c;
            --border: #e6e1d9;
            --accent: #b3541e;
            --accent-fg: #fff;
            --shadow: 0 1px 2px rgba(0, 0, 0, .06), 0 6px 20px rgba(0, 0, 0, .05);
        }

        html[data-theme="dark"] {
            --bg: #15171b;
            --surface: #1c1f24;
            --paper: #fdfcf9;
            /* content card stays light paper, by design */
            --fg: #e8e5df;
            --muted: #969ca5;
            --border: #2a2e35;
            --accent: #e08a5d;
            --accent-fg: #15171b;
            --shadow: 0 1px 2px rgba(0, 0, 0, .4), 0 8px 28px rgba(0, 0, 0, .35);
        }

        * {
            box-sizing: border-box;
        }

        /* backstop for the overscroll area; a dict rarely targets <html> */
        html {
            background: var(--bg);
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.618;
            -webkit-text-size-adjust: 100%;
        }

        /* the app wrapper owns the visible theme surface (not <body>), so a dict's
           generic `body {…}` rule can't whitewash dark mode */
        .app {
            min-height: 100vh;
            background: var(--bg);
            color: var(--fg);
        }

        /* ── sticky top bar ── */
        .bar {
            position: sticky;
            top: 0;
            z-index: 50;
            padding: var(--sp-sm) var(--sp);
            background: color-mix(in srgb, var(--surface) 90%, transparent);
            -webkit-backdrop-filter: saturate(180%) blur(10px);
            backdrop-filter: saturate(180%) blur(10px);
            border-bottom: 1px solid var(--border);
            transition: transform .25s ease;
        }

        .bar.is-hidden {
            transform: translateY(-100%);
        }

        .bar form {
            display: flex;
            align-items: center;
            gap: var(--sp-sm);
            max-width: var(--measure);
            margin: 0 auto;
        }

        .q {
            flex: 1 1 auto;
            min-width: 0;
            font-size: var(--t-md);
            color: var(--fg);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--sp-xs) var(--sp-sm);
        }

        .q:focus {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
            border-color: transparent;
        }

        .sel {
            flex: 0 1 auto;
            max-width: 12em;
            font-size: var(--t-sm);
            color: var(--muted);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--sp-xs) var(--sp-sm);
        }

        .iconbtn {
            flex: 0 0 auto;
            display: grid;
            place-items: center;
            width: 2.4em;
            height: 2.4em;
            padding: 0;
            color: var(--muted);
            background: transparent;
            border: 1px solid transparent;
            border-radius: var(--radius);
            cursor: pointer;
        }

        .iconbtn:hover {
            color: var(--accent);
            background: var(--bg);
        }

        .iconbtn svg {
            width: 1.2em;
            height: 1.2em;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .go {
            color: var(--accent-fg);
            background: var(--accent);
            border-color: var(--accent);
        }

        .go:hover {
            color: var(--accent-fg);
            background: var(--accent);
            filter: brightness(1.06);
        }

        /* sun shows in dark (→go light), moon shows in light (→go dark) */
        .i-sun {
            display: none;
        }

        html[data-theme="dark"] .i-sun {
            display: block;
        }

        html[data-theme="dark"] .i-moon {
            display: none;
        }

        /* ── main column ── */
        .wrap {
            max-width: var(--measure);
            margin: 0 auto;
            padding: var(--sp-md) var(--sp);
        }

        .empty {
            margin-top: var(--sp-lg);
            text-align: center;
            color: var(--muted);
        }

        .keywords {
            margin: 0;
            padding: 0;
            list-style: none;
            columns: 16ch auto;
            column-gap: var(--sp-md);
        }

        .keywords a {
            display: block;
            padding: var(--sp-xs) 0;
            color: var(--fg);
            text-decoration: none;
            font-size: var(--t-sm);
        }

        .keywords a:hover {
            color: var(--accent);
        }

        /* dictionary content (single DOM: the dict's own css/js applies on purpose,
           and the light/dark theme cascade reaches it) */
        .content {
            color: var(--fg);
        }

        .content img,
        .content video {
            max-width: 100%;
            height: auto;
        }

        mark {
            background: #ffe6a3;
            color: #3a2c00;
            border-radius: 2px;
            padding: 0 .1em;
        }

        /* ── forced dark for dictionary content ──
           MDX entries hard-code light colors, so in dark mode we flip the whole
           .content block (invert + hue-rotate, Dark-Reader style) and flip media
           back. brightness/contrast are eased so we land on near-black / soft-white
           instead of pure #000/#fff (avoids halation), and images get dimmed — per
           dark-mode color guidance. Rough, but the dict's own hue-coding survives.
           Add data-noinvert to opt an element out. */
        html[data-theme="dark"] .content {
            background: #fafafa;
            color: #1a1a1a;
            filter: invert(1) hue-rotate(180deg) brightness(.9) contrast(.9);
        }

        html[data-theme="dark"] .content :is(img, picture, video, svg, canvas, iframe, embed, object, mark, [data-noinvert]) {
            filter: invert(1) hue-rotate(180deg);
        }

        @media (max-width:560px) {
            .wrap {
                padding: var(--sp) var(--sp-sm);
            }

            .sel {
                max-width: 7.5em;
            }
        }
    </style>
</head>

<body>
    <div class="app">
    <header class="bar" id="bar">
        <form action="#" name="frm" role="search">
            <input class="q" id="q" name="q" type="search" placeholder="$$${{{DICT_NAME}}}" autocomplete="off"
                autocapitalize="off" autocorrect="off" spellcheck="false" autofocus>
            <select class="sel" id="path" name="path" title="$$${{{DICT_NAME}}}">$$${{{DICT_OPTIONS}}}</select>
            <button class="iconbtn go" type="submit" title="Search" aria-label="Search">
                <svg viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="7" />
                    <line x1="21" y1="21" x2="16.5" y2="16.5" />
                </svg>
            </button>
            <button class="iconbtn" type="button" id="theme" title="Toggle light / dark" aria-label="Toggle theme">
                <svg class="i-sun" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="4" />
                    <path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19" />
                </svg>
                <svg class="i-moon" viewBox="0 0 24 24">
                    <path d="M21 12.8A8 8 0 1 1 11.2 3 6 6 0 0 0 21 12.8z" />
                </svg>
            </button>
        </form>
    </header>

    <main class="wrap">
        $$${{{DICT_BODY}}}
    </main>
    </div>

    <script src="mark.min.js"></script>
    <script>
        (function () {
            'use strict';

            // 'autohide' = retract on scroll-down, reveal on scroll-up; 'pinned' = always visible.
            var SEARCHBAR_MODE = 'autohide';

            var form = document.forms.frm;
            var params = new URLSearchParams(location.search);
            var q = params.get('q');
            var path = params.get('path');

            // ── restore controls from URL / localStorage ──
            if (q) form.q.value = q;
            if (path) {
                form.path.value = path;
                try { localStorage.setItem('mdict.lastPath', path); } catch (e) { }
            } else {
                try {
                    var last = localStorage.getItem('mdict.lastPath');
                    if (last && [].some.call(form.path.options, function (o) { return o.value === last; })) {
                        form.path.value = last;
                    }
                } catch (e) { }
            }
            form.path.addEventListener('change', function () {
                try { localStorage.setItem('mdict.lastPath', form.path.value); } catch (e) { }
                form.submit(); // switching dictionary loads it immediately
            });

            // ── theme toggle (instant, persisted) ──
            document.getElementById('theme').addEventListener('click', function () {
                var next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
                document.documentElement.dataset.theme = next;
                try { localStorage.setItem('mdict.theme', next); } catch (e) { }
            });

            // ── results: double-click to look up + highlight the query term ──
            // content renders in the single DOM, so the dict's own scripts already ran.
            var content = document.querySelector('.content');
            if (content) {
                content.addEventListener('dblclick', function () {
                    var w = (window.getSelection ? getSelection().toString() : '').trim();
                    if (w) { form.q.value = w; form.submit(); }
                });
                if (q && window.Mark) {
                    try {
                        new Mark(content).markRegExp(
                            new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'),
                            { element: 'mark' });
                    } catch (e) { }
                }
            }

            // ── sticky auto-hide (headroom pattern) ──
            if (SEARCHBAR_MODE === 'autohide') {
                var bar = document.getElementById('bar');
                var lastY = 0, ticking = false;
                addEventListener('scroll', function () {
                    if (ticking) return;
                    ticking = true;
                    requestAnimationFrame(function () {
                        var y = scrollY < 0 ? 0 : scrollY, d = y - lastY;
                        if (y < 8 || d < -6) bar.classList.remove('is-hidden');
                        else if (d > 6 && y > bar.offsetHeight) bar.classList.add('is-hidden');
                        lastY = y;
                        ticking = false;
                    });
                }, { passive: true });
            }
        })();
    </script>
</body>

</html>
